name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      live:
        description: "Also run the live x402 protocol smoke test against Surplus Intelligence"
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests
        run: bun run test
        env:
          SKIP_LIVE: "1"

  # Live protocol test: exercises the full 402 -> sign -> retry loop against the
  # production Surplus Intelligence API with a throwaway, unfunded wallet.
  # Spends nothing, but depends on third-party uptime -> manual trigger only.
  smoke:
    if: github.event_name == 'workflow_dispatch' && inputs.live
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Live smoke (throwaway wallet, no funds)
        run: bun run smoke
